<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{NAME}} – Resume</title>
    <style>
      /* ─── Page setup ─────────────────────────────────────────── */
      @page {
        size: Letter;
        margin: 0.45in 0.6in;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: "Times New Roman", Times, serif;
        font-size: 10pt;
        line-height: 1.35;
        color: #000;
        background: #fff;
      }

      /* ─── Header ─────────────────────────────────────────────── */
      #header {
        text-align: center;
        margin-bottom: 6px;
      }

      #name {
        font-size: 18pt;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 3px;
      }

      #contact {
        font-size: 9pt;
        color: #000;
        line-height: 1.5;
      }

      /* All links: black, no underline — ATS safe */
      a { color: #000 !important; text-decoration: none !important; }

      /* ─── Section ────────────────────────────────────────────── */
      .section { margin-top: 7px; }

      .section-title {
        font-size: 10pt;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-bottom: 1px solid #000;
        padding-bottom: 1px;
        margin-bottom: 5px;
      }

      /* ─── Summary ────────────────────────────────────────────── */
      #summary p {
        font-size: 9.5pt;
        text-align: justify;
      }

      /* ─── Skills ─────────────────────────────────────────────── */
      .skill-row {
        display: flex;
        gap: 4px;
        margin-bottom: 2px;
        font-size: 9.5pt;
      }

      .skill-category {
        font-weight: bold;
        white-space: nowrap;
        min-width: 110px;
      }

      .skill-items { flex: 1; }

      /* ─── Entry (Experience / Education / Certs) ──────────────── */
      .entry { margin-bottom: 6px; }

      .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .entry-left { flex: 1; }

      .entry-title {
        font-weight: bold;
        font-size: 10pt;
      }

      .entry-subtitle {
        font-style: italic;
        font-size: 9.5pt;
      }

      .entry-date {
        font-size: 9.5pt;
        white-space: nowrap;
        margin-left: 6px;
      }

      /* ─── Bullets ─────────────────────────────────────────────── */
      ul.bullets {
        margin-top: 2px;
        margin-left: 14px;
        list-style: disc;
      }

      ul.bullets li {
        font-size: 9.5pt;
        margin-bottom: 1px;
        text-align: justify;
      }

      /* ─── Projects ───────────────────────────────────────────── */
      .project-name  { font-weight: bold; font-size: 9.5pt; }
      .project-desc  { font-size: 9.5pt; }
      .project-tech  { font-style: italic; font-size: 9pt; }

      /* ─── Print: keep entries together ──────────────────────── */
      .entry { page-break-inside: avoid; }
    </style>
  </head>
  <body>

    <!-- ══════════ HEADER ══════════ -->
    <header id="header">
      <div id="name">{{NAME}}</div>
      <div id="contact">
        {{PHONE}} &nbsp;&bull;&nbsp; {{EMAIL}} &nbsp;&bull;&nbsp; {{LOCATION}}{{LINKS_ROW}}
      </div>
    </header>

    <!-- ══════════ SUMMARY ══════════ -->
    <section class="section" id="summary">
      <div class="section-title">Professional Summary</div>
      <p>{{SUMMARY}}</p>
    </section>

    <!-- ══════════ SKILLS ══════════ -->
    <section class="section" id="skills">
      <div class="section-title">Skills</div>
      {{SKILLS_ROWS}}
    </section>

    <!-- ══════════ EXPERIENCE ══════════ -->
    <section class="section" id="experience">
      <div class="section-title">Experience</div>
      {{EXPERIENCE_ENTRIES}}
    </section>

    <!-- ══════════ EDUCATION ══════════ -->
    <section class="section" id="education">
      <div class="section-title">Education</div>
      {{EDUCATION_ENTRIES}}
    </section>

    <!-- ══════════ CERTIFICATIONS (conditional) ══════════ -->
    {{CERTIFICATIONS_SECTION}}

    <!-- ══════════ PROJECTS (conditional) ══════════ -->
    {{PROJECTS_SECTION}}

  </body>
</html>
