<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{{NAME}} – Resume</title>
    <style>
      /* ─── Page ───────────────────────────────────────────────── */
      @page {
        size: Letter;
        margin: 0.5in 0.65in;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 10pt;
        line-height: 1.4;
        color: #000;
        background: #fff;
      }

      a { color: #000; text-decoration: none; }

      /* ─── Header ─────────────────────────────────────────────── */
      #header {
        text-align: center;
        margin-bottom: 10px;
      }

      #name {
        font-size: 26pt;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1.1;
        margin-bottom: 4px;
      }

      #tagline {
        font-size: 10pt;
        font-weight: bold;
        margin-bottom: 4px;
      }

      #contact {
        font-size: 9pt;
        color: #000;
      }

      /* ─── Section ────────────────────────────────────────────── */
      .section {
        margin-top: 10px;
        margin-bottom: 2px;
      }

      .section-title {
        font-size: 13pt;
        font-weight: 900;
        text-transform: uppercase;
        border-bottom: 1.5px solid #000;
        padding-bottom: 2px;
        margin-bottom: 6px;
      }

      /* ─── Summary ────────────────────────────────────────────── */
      #summary p {
        font-size: 9.5pt;
        text-align: justify;
      }

      /* ─── Experience / Education ──────────────────────────────── */
      .entry {
        margin-bottom: 8px;
        page-break-inside: avoid;
      }

      .entry-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .entry-left { flex: 1; }

      .entry-title {
        font-size: 10pt;
        font-weight: bold;
      }

      .entry-subtitle {
        font-size: 9.5pt;
        font-weight: normal;
      }

      .entry-date {
        font-size: 9.5pt;
        white-space: nowrap;
        margin-left: 8px;
        font-weight: bold;
      }

      /* ─── Bullets ─────────────────────────────────────────────── */
      ul.bullets {
        margin-top: 3px;
        margin-left: 16px;
        list-style: disc;
      }

      ul.bullets li {
        font-size: 9.5pt;
        margin-bottom: 2px;
        text-align: justify;
      }

      /* ─── Skills (flat bullet list) ──────────────────────────── */
      ul.skill-list {
        margin-left: 16px;
        list-style: disc;
      }

      ul.skill-list li {
        font-size: 9.5pt;
        margin-bottom: 2px;
      }

      /* ─── Certifications (flat bullet list) ──────────────────── */
      ul.cert-list {
        margin-left: 16px;
        list-style: disc;
      }

      ul.cert-list li {
        font-size: 9.5pt;
        margin-bottom: 2px;
      }

      /* ─── Projects ───────────────────────────────────────────── */
      .project-name { font-weight: bold; font-size: 9.5pt; }
      .project-desc { font-size: 9.5pt; }
      .project-tech { font-style: italic; font-size: 9pt; }
    </style>
  </head>
  <body>

    <!-- ══════════ HEADER ══════════ -->
    <header id="header">
      <div id="name">{{NAME}}</div>
      <div id="tagline">{{TAGLINE}}</div>
      <div id="contact">
        {{LOCATION}} &nbsp;|&nbsp; {{EMAIL}} &nbsp;|&nbsp; {{PHONE}}{{LINKS_ROW}}
      </div>
    </header>

    <!-- ══════════ PROFESSIONAL SUMMARY ══════════ -->
    <section class="section" id="summary">
      <div class="section-title">Professional Summary</div>
      <p>{{SUMMARY}}</p>
    </section>

    <!-- ══════════ WORK EXPERIENCE ══════════ -->
    <section class="section" id="experience">
      <div class="section-title">Work Experience</div>
      {{EXPERIENCE_ENTRIES}}
    </section>

    <!-- ══════════ EDUCATION ══════════ -->
    <section class="section" id="education">
      <div class="section-title">Education</div>
      {{EDUCATION_ENTRIES}}
    </section>

    <!-- ══════════ SKILLS ══════════ -->
    <section class="section" id="skills">
      <div class="section-title">Skills</div>
      <ul class="skill-list">
        {{SKILLS_ITEMS}}
      </ul>
    </section>

    <!-- ══════════ CERTIFICATIONS (conditional) ══════════ -->
    {{CERTIFICATIONS_SECTION}}

    <!-- ══════════ PROJECTS (conditional) ══════════ -->
    {{PROJECTS_SECTION}}

  </body>
</html>
