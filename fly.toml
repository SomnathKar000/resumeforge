app = "resumeforge"
primary_region = "iad"

[build]
  builder = "paketobuildpacks"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  internal_port = 3000
  processes = ["app"]
  
  [services.http_checks]
    enabled = true
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    path = "/health"